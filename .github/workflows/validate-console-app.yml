name: Validate Console Application

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Discover .NET projects
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          if find . -maxdepth 3 -type f \( -name '*.sln' -o -name '*.csproj' \) | grep -q .; then
            echo "has_dotnet_projects=true" >> "$GITHUB_OUTPUT"
            echo "Detected at least one .sln or .csproj file."
          else
            echo "has_dotnet_projects=false" >> "$GITHUB_OUTPUT"
            echo "No .sln or .csproj files found. Skipping .NET validation steps."
          fi

      - name: Restore dependencies
        if: steps.discover.outputs.has_dotnet_projects == 'true'
        run: dotnet restore

      - name: Build
        if: steps.discover.outputs.has_dotnet_projects == 'true'
        run: dotnet build --configuration Release --no-restore

      - name: Run tests (if test projects exist)
        if: steps.discover.outputs.has_dotnet_projects == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_projects < <(find . -type f \( -name '*Tests.csproj' -o -name '*.Tests.csproj' \))
          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No test projects found. Skipping test run."
            exit 0
          fi

          for project in "${test_projects[@]}"; do
            echo "Running tests for $project"
            dotnet test "$project" --configuration Release --no-build --verbosity normal
          done
