name: Validate Console Application

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests (if test projects exist)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_projects < <(find . -type f \( -name '*Tests.csproj' -o -name '*.Tests.csproj' \))
          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No test projects found. Skipping test run."
            exit 0
          fi

          for project in "${test_projects[@]}"; do
            echo "Running tests for $project"
            dotnet test "$project" --configuration Release --no-build --verbosity normal
          done
